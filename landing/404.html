<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page not found · CertAnvil</title>
<meta name="theme-color" content="#fafbff">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="That page isn't here. Head back to CertAnvil or take the free baseline diagnostic.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
// Theme bootstrap — paints in the right theme on first frame. Light default;
// localStorage 'certanvil_theme' overrides; else follow system.
(function () {
  var t = 'light';
  try {
    var s = localStorage.getItem('certanvil_theme');
    if (s === 'light' || s === 'dark') t = s;
    else if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
  } catch (e) {}
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
  /* CertAnvil forged-bronze editorial · self-contained error page.
     Tokens per brand/BRAND.md (OKLCH, theme-adaptive). Scoped to #nf so the
     page renders even if styles.css / dg-system.css never load. */
  #nf{
    --bg:oklch(0.975 0.007 85);--surface:oklch(0.992 0.004 85);--surface-2:oklch(0.965 0.010 84);
    --ink:oklch(0.22 0.015 280);--ink-soft:oklch(0.36 0.014 280);--muted:oklch(0.50 0.013 280);
    --border:oklch(0.86 0.008 85);--border-soft:oklch(0.91 0.006 85);
    --accent:oklch(0.50 0.155 55);--accent-bright:oklch(0.80 0.155 64);--accent-deep:oklch(0.42 0.150 52);
    --on-accent:oklch(0.985 0.010 85);
    --eo:cubic-bezier(0.16,1,0.3,1);
    min-height:100svh;display:flex;flex-direction:column;
    background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;
  }
  html[data-theme="dark"] #nf{
    --bg:oklch(0.16 0.009 275);--surface:oklch(0.205 0.009 275);--surface-2:oklch(0.185 0.009 275);
    --ink:oklch(0.96 0.006 275);--ink-soft:oklch(0.78 0.010 275);--muted:oklch(0.60 0.013 275);
    --border:oklch(0.30 0.008 275);--border-soft:oklch(0.26 0.008 275);
    --accent:oklch(0.80 0.155 64);--accent-bright:oklch(0.86 0.140 70);--accent-deep:oklch(0.70 0.150 62);
    --on-accent:oklch(0.18 0.020 275);
  }
  #nf *{box-sizing:border-box}

  /* ── Header · logo + theme toggle ── */
  #nf .nf-top{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    max-width:1180px;width:100%;margin:0 auto;padding:18px clamp(20px,4vw,32px);
  }
  #nf .nf-logo{display:flex;align-items:center;gap:11px;text-decoration:none}
  #nf .nf-logo-mark{width:32px;height:32px;display:block;flex:none}
  #nf .nf-logo-mark svg{width:100%;height:100%;display:block;fill:none}
  #nf .nf-logo-mark .ca-c,#nf .nf-logo-mark .ca-a{stroke:var(--accent)}
  #nf .nf-logo-mark .ca-slash{stroke:var(--muted)}
  #nf .nf-logo-name{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;letter-spacing:-.01em;color:var(--ink)}
  #nf .nf-toggle{
    display:grid;place-items:center;width:36px;height:36px;
    border:1px solid var(--border);border-radius:10px;background:var(--surface);
    color:var(--ink-soft);cursor:pointer;position:relative;
    transition:color 200ms var(--eo),border-color 200ms var(--eo);
  }
  @media (hover:hover) and (pointer:fine){#nf .nf-toggle:hover{color:var(--accent);border-color:color-mix(in oklab,var(--accent) 40%,var(--border))}}
  #nf .nf-toggle:focus-visible{outline:2px solid color-mix(in oklab,var(--accent) 55%,transparent);outline-offset:2px}
  #nf .nf-toggle svg{position:absolute;width:17px;height:17px;transition:opacity 260ms var(--eo),transform 260ms var(--eo)}
  #nf .nf-icon-sun{opacity:1;transform:none}
  #nf .nf-icon-moon{opacity:0;transform:rotate(-90deg)}
  html[data-theme="dark"] #nf .nf-icon-sun{opacity:0;transform:rotate(90deg)}
  html[data-theme="dark"] #nf .nf-icon-moon{opacity:1;transform:none}

  /* ── Main · centered editorial ── */
  #nf .nf-main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:0;padding:48px clamp(20px,5vw,32px) 64px;
  }
  #nf .nf-eyebrow{
    font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
  }
  #nf .nf-code{
    font-family:'Fraunces',Georgia,serif;font-weight:600;
    font-size:clamp(108px,20vw,184px);line-height:1;letter-spacing:-.04em;
    color:var(--ink);margin:14px 0 4px;
    /* Brand lining-nums rule — uniform cap-height digits (no old-style 4/0 mismatch) */
    font-variant-numeric:lining-nums tabular-nums;font-feature-settings:"lnum","tnum";
  }
  #nf .nf-title{
    font-family:'Fraunces',Georgia,serif;font-weight:600;
    font-size:clamp(24px,4vw,32px);line-height:1.1;letter-spacing:-.02em;color:var(--ink);margin:0;
  }
  #nf .nf-sub{
    font-size:15.5px;line-height:1.6;color:var(--ink-soft);max-width:430px;margin:14px auto 0;
  }
  #nf .nf-actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:30px}
  #nf .nf-cta{
    display:inline-flex;align-items:center;gap:8px;min-height:44px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:650;text-decoration:none;
    padding:12px 22px;border-radius:11px;cursor:pointer;
    transition:transform 150ms var(--eo),background 180ms var(--eo),border-color 180ms var(--eo),color 180ms var(--eo);
  }
  #nf .nf-cta-primary{color:var(--on-accent);background:var(--accent);border:1px solid var(--accent-deep)}
  #nf .nf-cta-ghost{color:var(--accent);background:none;border:1px solid color-mix(in oklab,var(--accent) 32%,var(--border))}
  @media (hover:hover) and (pointer:fine){
    #nf .nf-cta-primary:hover{background:var(--accent-deep)}
    #nf .nf-cta-ghost:hover{background:color-mix(in oklab,var(--accent) 8%,transparent);border-color:color-mix(in oklab,var(--accent) 45%,var(--border))}
  }
  #nf .nf-cta:active{transform:scale(0.97)}
  #nf .nf-cta:focus-visible{outline:2px solid color-mix(in oklab,var(--accent) 55%,transparent);outline-offset:2px}

  /* ── Footer ── */
  #nf .nf-foot{
    border-top:1px solid var(--border-soft);
    max-width:1180px;width:100%;margin:0 auto;padding:20px clamp(20px,4vw,32px);
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;
    font-size:12.5px;color:var(--muted);
  }
  #nf .nf-foot a{color:var(--ink-soft);text-decoration:none;margin-left:18px}
  @media (hover:hover) and (pointer:fine){#nf .nf-foot a:hover{color:var(--accent)}}

  /* entrance — fade + tiny rise; collapses to fade under reduced-motion */
  #nf .nf-main>*{opacity:0;transform:translateY(10px);animation:nfIn .56s var(--eo) forwards}
  #nf .nf-eyebrow{animation-delay:40ms}#nf .nf-code{animation-delay:90ms}
  #nf .nf-title{animation-delay:150ms}#nf .nf-sub{animation-delay:200ms}#nf .nf-actions{animation-delay:250ms}
  @keyframes nfIn{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    #nf .nf-main>*{animation:nfFade .3s ease forwards;transform:none}
    #nf .nf-toggle svg,#nf .nf-cta{transition:none}
    @keyframes nfFade{to{opacity:1}}
  }
</style>
</head>
<body>
<div id="nf">
  <header class="nf-top">
    <a class="nf-logo" href="/" aria-label="CertAnvil home">
      <span class="nf-logo-mark" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path class="ca-c" d="M58 12 C42 6, 16 16, 14 34 C12 52, 22 62, 42 64" stroke-width="7" stroke-linecap="round"/>
          <line class="ca-slash" x1="30" y1="84" x2="70" y2="16" stroke-width="5" stroke-linecap="round"/>
          <path class="ca-a" d="M46 88 L64 50 L82 88 M53 74 L75 74" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="nf-logo-name">CertAnvil</span>
    </a>
    <button type="button" class="nf-toggle" id="nf-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
      <svg class="nf-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <svg class="nf-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main class="nf-main">
    <span class="nf-eyebrow">Error 404</span>
    <div class="nf-code">404</div>
    <h1 class="nf-title">This page isn't on the anvil.</h1>
    <p class="nf-sub">The page you're after moved or never existed. Nothing's broken on your end. Here's the way back:</p>
    <div class="nf-actions">
      <a class="nf-cta nf-cta-primary" href="/">Back to CertAnvil <span aria-hidden="true">→</span></a>
      <a class="nf-cta nf-cta-ghost" href="/diagnostic">Take the free diagnostic <span aria-hidden="true">→</span></a>
    </div>
  </main>

  <footer class="nf-foot">
    <span>certanvil.com · forged for the exam</span>
    <nav aria-label="Footer navigation">
      <a href="/pricing">Pricing</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </nav>
  </footer>
</div>

<script>
// Self-contained theme toggle (this page doesn't load script.js).
(function () {
  var btn = document.getElementById('nf-toggle');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('certanvil_theme', next); } catch (e) {}
  });
})();
</script>
</body>
</html>
