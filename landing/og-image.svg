<?xml version="1.0" encoding="UTF-8"?>
<!-- CertAnvil Open Graph image · 1200×630 (standard OG dimensions).
     Rendered when shared on Slack, Discord, X, LinkedIn, etc.
     v5.0.2: C/A monogram + de-purpled bronze palette. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <!-- Forge-black gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8860b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="600" ry="315" fill="url(#glow)"/>

  <!-- Logo mark — C/A monogram, scaled up -->
  <g transform="translate(440, 110)">
    <!-- Logo container (rounded square) -->
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#0d0d18" stroke="#2e2e38" stroke-width="2"/>
    <g transform="translate(0, 0)">
      <path d="M58 12 C42 6, 16 16, 14 34 C12 52, 22 62, 42 64" stroke="#b8860b" stroke-width="7" stroke-linecap="round"/>
      <line x1="30" y1="84" x2="70" y2="16" stroke="#6a6a76" stroke-width="5" stroke-linecap="round"/>
      <path d="M46 88 L64 50 L82 88 M53 74 L75 74" stroke="#b8860b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="600" y="290" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="84" font-weight="800" letter-spacing="-2"
    fill="url(#text-grad)">CertAnvil</text>

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="32" font-weight="600" letter-spacing="-0.5"
    fill="#b0b0cc">Forge your way through CompTIA certs</text>

  <!-- Sub-tagline -->
  <text x="600" y="410" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="20" font-weight="500"
    fill="#8a8aac">AI cert practice · 320+ curated exemplars · Built by an exam-passer</text>

  <!-- Pass-proof pill (visual element) -->
  <g transform="translate(360, 470)">
    <rect x="0" y="0" width="480" height="48" rx="24"
      fill="#0d0d18" stroke="rgba(34,197,94,0.45)" stroke-width="1.5"/>
    <circle cx="28" cy="24" r="14" fill="#22c55e"/>
    <text x="28" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">✓</text>
    <text x="58" y="30"
      font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
      font-size="16" font-weight="600" fill="#b0b0cc">
      <tspan fill="#f0f0f8" font-weight="700">767/900 on Network+ N10-009</tspan> · using this tool
    </text>
  </g>

  <!-- URL footer -->
  <text x="600" y="580" text-anchor="middle"
    font-family="'SF Mono', 'JetBrains Mono', 'Monaco', monospace"
    font-size="20" font-weight="500"
    fill="#6b6b90">certanvil.com</text>
</svg>
