<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">CertAnvil 07-streak-flame</title>
  <desc id="desc">Transparent CertAnvil-style SVG icon in orange, cream, and dark ink.</desc>
  <defs>
    <linearGradient id="ca-orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E17A1A"/>
      <stop offset="1" stop-color="#C65300"/>
    </linearGradient>
    <linearGradient id="ca-cream" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FFF7EC"/>
    </linearGradient>
    <filter id="ca-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#141827" flood-opacity="0.10"/>
    </filter>
    <style>
      .line { fill:none; stroke:#2B333B; stroke-width:8; stroke-linecap:round; stroke-linejoin:round; }
      .line-sm { fill:none; stroke:#2B333B; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
      .line-xs { fill:none; stroke:#2B333B; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
      .muted { stroke:#D9D0C4; }
      .orange { stroke:#C65300; }
      .fill-cream { fill:url(#ca-cream); }
      .fill-soft { fill:#F8F1E8; }
      .fill-orange { fill:url(#ca-orange); }
      .fill-ink { fill:#141827; }
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight:800; }
    </style>
  </defs>

  <g filter="url(#ca-shadow)">
    <path class="fill-cream line" d="M128 220c-44 0-74-29-74-71 0-31 17-55 44-78 17-15 25-31 22-50 31 17 51 44 49 78 12-8 19-21 18-37 22 20 34 47 34 79 0 47-36 79-93 79z"/>
    <path class="fill-orange" d="M129 199c-25 0-43-17-43-41 0-19 11-34 27-49 10-9 15-18 13-31 22 14 34 34 31 58 9-4 14-12 15-23 13 14 21 30 21 49 0 22-19 37-64 37z"/>
    <path class="line-sm" stroke="#FFF7EC" d="M112 153l15 15 36-45"/>
  </g>

</svg>
