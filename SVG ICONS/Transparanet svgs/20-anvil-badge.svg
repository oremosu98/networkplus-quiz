<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">CertAnvil 20-anvil-badge</title>
  <desc id="desc">Transparent CertAnvil-style SVG icon in orange, cream, and dark ink.</desc>
  <defs>
    <linearGradient id="ca-orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E17A1A"/>
      <stop offset="1" stop-color="#C65300"/>
    </linearGradient>
    <linearGradient id="ca-cream" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FFF7EC"/>
    </linearGradient>
    <filter id="ca-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#141827" flood-opacity="0.10"/>
