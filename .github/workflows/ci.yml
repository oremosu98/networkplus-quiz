name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Run all tests ──
  test:
    name: UAT + Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run UAT (static analysis)
        run: node tests/uat.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: Tech debt monitor ──
  tech-debt:
    name: Tech Debt Monitor
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tech debt checks
        id: debt
        continue-on-error: true
        run: node tests/tech-debt.js

      - name: Create issue on breach
        if: steps.debt.outcome == 'failure' && github.event_name == 'push'
        uses: actions/github-script@v8
        with:
          # PROJECT_TOKEN needs the `project` scope so the GraphQL calls below
          # can add the new issue to Board #1 and set its status fields. Falls
          # back to GITHUB_TOKEN for the issue-creation REST call only — the
          # auto-add-to-board workflow then handles board placement on the
          # `issues.opened` event when PROJECT_TOKEN is unset.
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = 'Thresholds breached — check CI logs for details.';
            try { report = fs.readFileSync('/tmp/tech-debt-report.txt', 'utf8'); } catch (_) {}
            const title = `[Tech Debt] Threshold breach — ${new Date().toISOString().slice(0,10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'tech-debt',
              state: 'open',
              per_page: 20
            });
            const alreadyReported = existing.data.some(i => i.title.startsWith('[Tech Debt] Threshold breach'));
            if (alreadyReported) {
              const issue = existing.data.find(i => i.title.startsWith('[Tech Debt] Threshold breach'));
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### Breach detected again — ${new Date().toISOString().slice(0,10)}\n\nCommit: ${context.sha.slice(0,7)}\n\n${report}`
              });
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['tech-debt', 'priority: medium'],
                body: `## Tech Debt Threshold Breach\n\nThe following thresholds were exceeded on commit ${context.sha.slice(0,7)}:\n\n${report}\n\n_Auto-generated by Tech Debt Monitor_`
              });
              try {
                const projectId = 'PVT_kwHOB0H7gM4BT-VD';
                const result = await github.graphql(`mutation { addProjectV2ItemById(input: { projectId: "${projectId}", contentId: "${issue.data.node_id}" }) { item { id } } }`);
                const itemId = result.addProjectV2ItemById.item.id;
                await github.graphql(`mutation { updateProjectV2ItemFieldValue(input: { projectId: "${projectId}", itemId: "${itemId}", fieldId: "PVTSSF_lAHOB0H7gM4BT-VDzhBQYqI", value: { singleSelectOptionId: "f0fdf4e6" } }) { projectV2Item { id } } }`);
                await github.graphql(`mutation { updateProjectV2ItemFieldValue(input: { projectId: "${projectId}", itemId: "${itemId}", fieldId: "PVTSSF_lAHOB0H7gM4BT-VDzhBJlx0", value: { singleSelectOptionId: "630cbc97" } }) { projectV2Item { id } } }`);
              } catch (_) {}
            }

  # ── JOB 3: Lighthouse audit (PRs only) ──
  lighthouse:
    name: Lighthouse Audit
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install serve
        run: npm install -g serve

      - name: Start server
        run: serve . -l 3131 -s &

      - name: Wait for server
        run: sleep 3

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://localhost:3131
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

      - name: Comment Lighthouse scores on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const resultsPath = '.lighthouseci';
            try {
              const files = fs.readdirSync(resultsPath).filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
              if (files.length === 0) return;
              const lhr = JSON.parse(fs.readFileSync(`${resultsPath}/${files[0]}`, 'utf8'));
              const scores = {
                Performance: Math.round(lhr.categories.performance.score * 100),
                Accessibility: Math.round(lhr.categories.accessibility.score * 100),
                'Best Practices': Math.round(lhr.categories['best-practices'].score * 100),
                SEO: Math.round(lhr.categories.seo.score * 100),
              };
              const emoji = s => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';
              const rows = Object.entries(scores).map(([k,v]) => `| ${emoji(v)} ${k} | ${v} |`).join('\n');
              const body = `## ⚡ Lighthouse Scores\n\n| Category | Score |\n|---|---|\n${rows}\n\n_Audited by Lighthouse CI_`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } catch (e) {
              console.log('Could not parse Lighthouse results:', e.message);
            }

  # ── JOB 4: Deploy to production (main only) ──
  deploy-production:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Build and deploy to production
        run: |
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  # ── JOB 5: Preview deploy for PRs ──
  deploy-preview:
    name: Deploy Preview
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${url}\n\nTests passed. Review the preview before merging.`
            });
