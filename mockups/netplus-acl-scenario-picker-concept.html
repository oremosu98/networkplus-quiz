<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CertAnvil · ACL Builder scenario picker redesign concept (Network+ · modal · dg-system)</title>
<!--
  CONCEPT MOCKUP · not production. Redesign of the ACL Builder "Pick a
  scenario" modal. Same dg-system + Emil center-origin dialog family as
  netplus-concept-labs-concept.html. Live ACL engine stays in
  features/acl-builder.js (gated, untouched).

  POV: a soft-shadow 2-col card grid (impeccable identical-card-grid
  ban) -> hairline grouped list, same vocabulary as Concept Labs:
  name + difficulty tag (text) + meta (tests · obj) + one-line brief.
  Emoji target/no-entry/lock/globe glyphs -> line icons. The CURRENT
  scenario gets an accent marker, not a pill bubble.
  MOTION: occasional surface -> center-origin scale 0.97->1, <=220ms,
  reduced-motion gated. List is scanned (calm, no scroll-reveal).
  HONESTY: every scenario + difficulty + test count + obj number
  mirrored from the capture. Free Build em-dash recomposed to a colon.
  Two scenarios were clipped in the capture (DNS-Only Lab Network,
  Stateful: Dev SSH) - their briefs completed minimally, not invented,
  flagged in the handoff.
  0 emoji · 0 hardcoded hex · 0 em-dash · app.js/index/styles untouched.
-->
<style>
  html:root{--dg-bg:oklch(0.17 0.008 275);--dg-bg-2:oklch(0.205 0.009 275);--dg-rule:oklch(0.32 0.011 275);--dg-rule-soft:oklch(0.255 0.010 275);--dg-text:oklch(0.96 0.006 275);--dg-text-2:oklch(0.80 0.012 275);--dg-text-dim:oklch(0.725 0.013 275);--dg-accent:oklch(0.80 0.155 64);--dg-accent-ink:oklch(0.20 0.045 64);--dg-pass:oklch(0.74 0.150 152);--dg-grid:oklch(0.23 0.009 275);--t-1:12px;--t0:14px;--t1:18px;--t2:23px;--t3:30px;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);}
  @media (prefers-color-scheme: light){html:root{--dg-bg:oklch(0.975 0.007 85);--dg-bg-2:oklch(0.945 0.008 85);--dg-rule:oklch(0.85 0.011 85);--dg-rule-soft:oklch(0.90 0.009 85);--dg-text:oklch(0.26 0.015 280);--dg-text-2:oklch(0.42 0.014 280);--dg-text-dim:oklch(0.50 0.013 280);--dg-accent:oklch(0.50 0.155 55);--dg-accent-ink:oklch(0.98 0.012 70);--dg-pass:oklch(0.50 0.15 150);--dg-grid:oklch(0.91 0.008 85);}}
  html[data-theme="dark"]{--dg-bg:oklch(0.17 0.008 275);--dg-bg-2:oklch(0.205 0.009 275);--dg-rule:oklch(0.32 0.011 275);--dg-rule-soft:oklch(0.255 0.010 275);--dg-text:oklch(0.96 0.006 275);--dg-text-2:oklch(0.80 0.012 275);--dg-text-dim:oklch(0.725 0.013 275);--dg-accent:oklch(0.80 0.155 64);--dg-accent-ink:oklch(0.20 0.045 64);--dg-pass:oklch(0.74 0.150 152);--dg-grid:oklch(0.23 0.009 275);}
  html[data-theme="light"]{--dg-bg:oklch(0.975 0.007 85);--dg-bg-2:oklch(0.945 0.008 85);--dg-rule:oklch(0.85 0.011 85);--dg-rule-soft:oklch(0.90 0.009 85);--dg-text:oklch(0.26 0.015 280);--dg-text-2:oklch(0.42 0.014 280);--dg-text-dim:oklch(0.50 0.013 280);--dg-accent:oklch(0.50 0.155 55);--dg-accent-ink:oklch(0.98 0.012 70);--dg-pass:oklch(0.50 0.15 150);--dg-grid:oklch(0.91 0.008 85);}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--dg-bg);color:var(--dg-text);font-family:Inter,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif;font-size:var(--t0);line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}

  .bg{position:fixed;inset:0;display:flex;flex-direction:column;filter:saturate(0.7);}
  .bg-strip{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--dg-rule-soft);}
  .bg-strip .t{font-size:var(--t1);font-weight:800;letter-spacing:-0.02em;color:var(--dg-text-2);}
  .bg-strip .t i{font-style:normal;color:var(--dg-accent);}
  .bg-strip .e{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--dg-text-dim);}
  .bg-canvas{flex:1;background:
    linear-gradient(var(--dg-grid) 1px,transparent 1px) 0 0/26px 26px,
    linear-gradient(90deg,var(--dg-grid) 1px,transparent 1px) 0 0/26px 26px,
    var(--dg-bg);}

  .scrim{position:fixed;inset:0;background:color-mix(in oklab,oklch(0 0 0) 56%,transparent);backdrop-filter:blur(2px);display:grid;place-items:center;padding:28px;z-index:20;}
  .modal{width:min(640px,100%);max-height:min(86vh,760px);display:flex;flex-direction:column;background:var(--dg-bg);border:1px solid var(--dg-rule);border-radius:16px;overflow:hidden;box-shadow:0 40px 90px -30px color-mix(in oklab,oklch(0 0 0) 70%,transparent);transform-origin:center center;animation:dlg 0.2s var(--ease) both;}
  @keyframes dlg{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion: reduce){.modal{animation:none;}}

  .m-h{display:flex;align-items:flex-start;gap:14px;padding:22px 22px 16px;border-bottom:1px solid var(--dg-rule-soft);}
  .m-ic{width:34px;height:34px;flex:none;border-radius:9px;border:1px solid var(--dg-rule);display:grid;place-items:center;color:var(--dg-accent);}
  .m-ic svg{width:17px;height:17px;}
  .m-ht{flex:1;min-width:0;}
  .m-ht .e{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--dg-text-dim);}
  .m-ht h1{font-size:var(--t2);font-weight:800;letter-spacing:-0.02em;margin-top:3px;}
  .m-ht .sub{margin-top:6px;font-size:var(--t-1);color:var(--dg-text-dim);}
  .m-x{flex:none;width:32px;height:32px;border-radius:8px;border:1px solid var(--dg-rule);background:none;color:var(--dg-text-dim);cursor:pointer;display:grid;place-items:center;transition:border-color 0.15s,color 0.15s;}
  .m-x:hover{border-color:var(--dg-accent);color:var(--dg-accent);}
  .m-x svg{width:14px;height:14px;}

  .m-list{flex:1;overflow-y:auto;padding:8px 6px 10px;}
  .g-h{padding:16px 16px 8px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--dg-text-dim);}

  .sc{display:flex;align-items:flex-start;gap:14px;width:100%;text-align:left;background:none;border:0;border-top:1px solid var(--dg-rule-soft);padding:14px 16px;cursor:pointer;color:inherit;transition:background 0.12s ease;position:relative;}
  .sc:first-of-type{border-top:0;}
  .sc:hover{background:var(--dg-bg-2);}
  .sc.cur{background:color-mix(in oklab,var(--dg-accent) 7%,transparent);}
  .sc.cur::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;border-radius:2px;background:var(--dg-accent);}
  .sc-i{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--dg-rule-soft);display:grid;place-items:center;color:var(--dg-text-dim);margin-top:1px;}
  .sc.cur .sc-i{color:var(--dg-accent);border-color:var(--dg-accent);}
  .sc-i svg{width:15px;height:15px;}
  .sc-b{flex:1;min-width:0;}
  .sc-t{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .sc-t .nm{font-size:var(--t0);font-weight:700;color:var(--dg-text);letter-spacing:-0.01em;}
  .tag{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dg-pass);}
  .tag.mid{color:var(--dg-accent);}
  .cur-k{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dg-accent);}
  .sc-d{margin-top:6px;font-size:var(--t-1);color:var(--dg-text-2);line-height:1.55;}
  .sc-m{margin-top:7px;font-size:11px;color:var(--dg-text-dim);font-variant-numeric:tabular-nums;display:flex;gap:14px;}
  .sc-go{flex:none;align-self:center;color:var(--dg-text-dim);opacity:0;transition:opacity 0.12s ease,transform 0.12s ease;}
  .sc:hover .sc-go{opacity:1;transform:translateX(2px);}
  .sc-go svg{width:16px;height:16px;}
</style>
<script>(function(){try{var t=localStorage.getItem('certanvilTheme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="bg-strip"><span class="t">ACL <i>builder.</i></span><span class="e">Network+ · Sandbox · firewall rules</span></div>
  <div class="bg-canvas"></div>
</div>

<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="acl-h" id="modal">
    <div class="m-h">
      <span class="m-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg></span>
      <div class="m-ht">
        <div class="e">ACL builder</div>
        <h1 id="acl-h">Pick a scenario</h1>
        <div class="sub">Each one is a real firewall-policy problem with packet tests and a grader.</div>
      </div>
      <button class="m-x" type="button" aria-label="Close" onclick="document.getElementById('scrim').style.display='none'"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>

    <div class="m-list">
      <div class="g-h">Sandbox</div>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 3v6l-5 9a2 2 0 0 0 2 3h12a2 2 0 0 0 2-3l-5-9V3" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 3h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">Free Build</span><span class="tag">Beginner</span></span>
          <span class="sc-d">Experiment freely: add rules, test packets, and learn how first-match-wins and implicit-deny behave.</span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>

      <div class="g-h">Fundamentals</div>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6"/><path d="M6 6l12 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">Block a Single Host</span><span class="tag">Beginner</span></span>
          <span class="sc-d">A compromised workstation at 10.0.0.50 needs to be fully isolated. Block all traffic from that host; allow everyone else.</span>
          <span class="sc-m"><span>4 tests</span><span>Obj 4.3</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">Allow HTTPS Outbound Only</span><span class="tag">Beginner</span></span>
          <span class="sc-d">A high-security workstation subnet may browse the web over HTTPS only. Block plain HTTP, FTP, everything else. Rely on implicit deny.</span>
          <span class="sc-m"><span>4 tests</span><span>Obj 4.3</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>

      <div class="g-h">Real-world</div>
      <button class="sc cur" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M5 21V6l7-3 7 3v15M9 21v-5h6v5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 9h.01M15 9h.01M9 12h.01M15 12h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">Guest Isolation from HR</span><span class="tag mid">Intermediate</span><span class="cur-k">Current</span></span>
          <span class="sc-d">Guest Wi-Fi clients must reach the internet freely but must NOT reach the internal HR subnet. Classic VLAN isolation pattern.</span>
          <span class="sc-m"><span>5 tests</span><span>Obj 4.3, 4.5</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" stroke="currentColor" stroke-width="1.4"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">DMZ Web Server Policy</span><span class="tag mid">Intermediate</span></span>
          <span class="sc-d">A public web server in the DMZ must be reachable from the internet on HTTP and HTTPS. Everything else inbound to the DMZ is blocked.</span>
          <span class="sc-m"><span>5 tests</span><span>Obj 4.3, 4.5</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="6" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10h8M8 14h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">DNS-Only Lab Network</span><span class="tag mid">Intermediate</span></span>
          <span class="sc-d">A quarantined lab subnet may only reach your internal DNS server. No other outbound traffic is permitted. Tight allow-list practice.</span>
          <span class="sc-m"><span>5 tests</span><span>Obj 4.3</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <button class="sc" type="button">
        <span class="sc-i" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 14-5M20 12a8 8 0 0 1-14 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M18 3v4h-4M6 21v-4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="sc-b">
          <span class="sc-t"><span class="nm">Stateful: Dev SSH with Auto-Returns</span><span class="tag mid">Intermediate</span></span>
          <span class="sc-d">Developers SSH to the build server and the replies must come back. In STATEFUL mode, one outbound permit auto-allows the return traffic.</span>
          <span class="sc-m"><span>5 tests</span><span>Obj 4.3, 4.5</span></span>
        </span>
        <span class="sc-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
    </div>
  </div>
</div>

<script>
  (function(){var s=document.getElementById('scrim');s.addEventListener('click',function(e){if(e.target===s)s.style.display='none';});document.addEventListener('keydown',function(e){if(e.key==='Escape')s.style.display='none';});})();
</script>

</body>
</html>
