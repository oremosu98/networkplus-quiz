<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CertAnvil — Choose your plan · Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c10; --bg2:#15131a; --surface:#1b1822; --surface2:#241f2c;
    --hair:rgba(255,255,255,.09); --hair2:rgba(255,255,255,.16);
    --text:#ece8f0; --text-mid:#b3adbd; --text-dim:#8b8594;
    --accent:#caa05a; --accent-hi:#e7c98c; --accent-deep:#7a5a2a;
    --green:#46b483; --green-dim:rgba(70,180,131,.16);
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #1b1426 0%, var(--bg) 55%);
    color:var(--text); line-height:1.5; min-height:100dvh;
    padding:max(18px,env(safe-area-inset-top)) 18px calc(120px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:440px;margin:0 auto;}

  .tagchip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--accent);background:color-mix(in oklab,var(--accent) 14%,transparent);
    border:1px solid color-mix(in oklab,var(--accent) 30%,transparent);padding:5px 11px;border-radius:99px;margin:6px 0 14px;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(28px,8vw,34px);line-height:1.08;
    letter-spacing:-.02em;margin:0 0 8px;}
  h1 i{font-style:italic;color:var(--accent-hi);}
  .sub{color:var(--text-mid);font-size:14.5px;margin:0 0 18px;max-width:30em;}

  /* billing cadence segmented (mirrors the price cards; tapping syncs) */
  .cards{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
  .card{position:relative;display:block;width:100%;text-align:left;cursor:pointer;
    background:var(--surface);border:1.5px solid var(--hair);border-radius:var(--radius);
    padding:16px 16px 16px 52px;transition:border-color .18s,background .18s,transform .12s;}
  .card:active{transform:scale(.992);}
  .card.sel{border-color:var(--accent);background:linear-gradient(135deg,color-mix(in oklab,var(--accent) 13%,var(--surface)),var(--surface));}
  .card.best{border-color:color-mix(in oklab,var(--accent) 45%,var(--hair));}
  .radio{position:absolute;left:16px;top:18px;width:22px;height:22px;border-radius:50%;
    border:2px solid var(--hair2);display:grid;place-items:center;transition:border-color .18s;}
  .card.sel .radio{border-color:var(--accent);}
  .radio::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--accent);
    transform:scale(0);transition:transform .18s;}
  .card.sel .radio::after{transform:scale(1);}
  .crow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .cname{font-size:15.5px;font-weight:800;letter-spacing:-.01em;}
  .cprice{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;white-space:nowrap;}
  .cprice small{font-family:'Inter';font-weight:600;font-size:11.5px;color:var(--text-dim);}
  .cmeta{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .feats{list-style:none;margin:11px 0 0;padding:0;display:flex;flex-direction:column;gap:5px;}
  .feats li{font-size:12.5px;color:var(--text-mid);padding-left:20px;position:relative;}
  .feats li::before{content:"✓";position:absolute;left:0;color:var(--accent);font-weight:800;}
  .feats li.free::before{content:"·";color:var(--text-dim);font-weight:800;font-size:16px;line-height:.9;}
  .badge{position:absolute;top:-9px;right:14px;background:linear-gradient(120deg,var(--accent),var(--accent-deep));
    color:#1a140a;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:99px;}

  .reassure{display:flex;gap:14px;flex-wrap:wrap;margin:16px 2px 0;font-size:11.5px;color:var(--text-dim);}
  .reassure span{display:inline-flex;align-items:center;gap:5px;}

  /* sticky CTA */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:20;
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent, var(--bg) 34%);}
  .dock .inner{max-width:440px;margin:0 auto;}
  .cta{width:100%;border:none;border-radius:14px;padding:16px;font-family:'Inter';font-weight:800;
    font-size:16px;color:#1a140a;background:linear-gradient(120deg,var(--accent-hi),var(--accent));
    cursor:pointer;box-shadow:0 10px 30px -12px color-mix(in oklab,var(--accent) 70%,transparent);}
  .cta:active{transform:translateY(1px);}
  .cta.free{background:var(--surface2);color:var(--text);border:1.5px solid var(--hair2);box-shadow:none;}
  .skip{display:block;width:100%;text-align:center;background:none;border:none;color:var(--text-dim);
    font-size:12.5px;font-weight:600;margin-top:9px;cursor:pointer;font-family:'Inter';}

  /* mock "what happens next" sheet */
  .sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;}
  .sheet-bg.open{display:flex;}
  .sheet{width:100%;max-width:440px;margin:0 auto;background:var(--bg2);border:1px solid var(--hair);
    border-bottom:none;border-radius:22px 22px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(8px);}
  .sheet h3{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;margin:4px 0 6px;}
  .sheet p{font-size:13.5px;color:var(--text-mid);margin:0 0 8px;}
  .sheet .step{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--hair);
    border-radius:12px;padding:11px 13px;margin:10px 0;font-size:13px;}
  .sheet .step b{color:var(--text);}
  .sheet .num{width:22px;height:22px;border-radius:7px;background:color-mix(in oklab,var(--accent) 18%,transparent);
    color:var(--accent);font-weight:800;font-size:12px;display:grid;place-items:center;flex-shrink:0;}
  .sheet .close{width:100%;margin-top:8px;border:1.5px solid var(--hair2);background:transparent;color:var(--text);
    border-radius:12px;padding:13px;font-weight:700;font-size:14px;font-family:'Inter';cursor:pointer;}

  .concept-flag{position:fixed;left:8px;bottom:calc(8px + env(safe-area-inset-bottom));z-index:80;
    font-size:9px;font-weight:700;letter-spacing:.05em;color:#d6b06a;background:#241a08;
    border:1px solid #4a3a14;border-radius:7px;padding:3px 7px;text-transform:uppercase;pointer-events:none;opacity:.9;}
</style>
</head>
<body>
<div class="wrap">
  <span class="tagchip">● You're in — welcome</span>
  <h1>Choose your <i>plan</i></h1>
  <p class="sub">Start free, or unlock every cert and unlimited practice with Pro. Change or cancel anytime.</p>

  <div class="cards" id="cards">
    <!-- Annual (default / best value) -->
    <button class="card best sel" data-plan="annual" aria-pressed="true">
      <span class="badge">Best value · save 26%</span>
      <span class="radio" aria-hidden="true"></span>
      <span class="crow">
        <span class="cname">Pro · Annual</span>
        <span class="cprice">$89<small>/yr</small></span>
      </span>
      <span class="cmeta">That's just $7.42/mo, billed yearly</span>
      <ul class="feats">
        <li>All 8 certs — switch anytime</li>
        <li>Unlimited questions every day</li>
        <li>Full Daily Review (spaced repetition)</li>
      </ul>
    </button>

    <!-- Monthly -->
    <button class="card" data-plan="monthly" aria-pressed="false">
      <span class="radio" aria-hidden="true"></span>
      <span class="crow">
        <span class="cname">Pro · Monthly</span>
        <span class="cprice">$9.99<small>/mo</small></span>
      </span>
      <span class="cmeta">Everything in Pro, billed monthly</span>
      <ul class="feats">
        <li>All 8 certs — switch anytime</li>
        <li>Unlimited questions every day</li>
        <li>Full Daily Review (spaced repetition)</li>
      </ul>
    </button>

    <!-- Free -->
    <button class="card" data-plan="free" aria-pressed="false">
      <span class="radio" aria-hidden="true"></span>
      <span class="crow">
        <span class="cname">Free</span>
        <span class="cprice">$0</span>
      </span>
      <span class="cmeta">Great to start — no card needed</span>
      <ul class="feats">
        <li class="free">20 questions a day <span style="color:var(--text-dim)">(15 practice + 5 Daily Review)</span></li>
        <li class="free">One cert at a time — locked until you go Pro</li>
        <li class="free">Diagnostic + core practice</li>
      </ul>
    </button>
  </div>

  <div class="reassure">
    <span>🔒 Cancel anytime</span>
    <span>↩︎ Switch plans whenever</span>
    <span>🍎 Apple Pay supported</span>
  </div>
</div>

<!-- sticky CTA -->
<div class="dock">
  <div class="inner">
    <button class="cta" id="cta">Start Pro — $89/yr</button>
    <button class="skip" id="skip">Restore a purchase</button>
  </div>
</div>

<!-- mock "what happens next" -->
<div class="sheet-bg" id="sheetbg">
  <div class="sheet" id="sheet"></div>
</div>

<div class="concept-flag">Concept · billing not wired</div>

<script>
  var sel = 'annual';
  var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));
  var cta = document.getElementById('cta');
  var skip = document.getElementById('skip');
  var ctaText = { annual:'Start Pro — $89/yr', monthly:'Start Pro — $9.99/mo', free:'Continue with Free' };

  function paint(){
    cards.forEach(function(c){
      var on = c.dataset.plan === sel;
      c.classList.toggle('sel', on);
      c.setAttribute('aria-pressed', on ? 'true':'false');
    });
    cta.textContent = ctaText[sel];
    cta.classList.toggle('free', sel === 'free');
    skip.style.display = (sel === 'free') ? 'none' : 'block';
  }
  cards.forEach(function(c){
    c.addEventListener('click', function(){ sel = c.dataset.plan; paint(); });
  });

  // mock the hand-off so the founder can see where each choice leads
  function sheetHTML(){
    if (sel === 'free'){
      return '<h3>Next: pick your cert</h3>'+
        '<p>On Free you study <b>one cert at a time</b>. You\'ll choose it next — and you\'ll be warned it\'s locked to that cert until you upgrade.</p>'+
        '<div class="step"><span class="num">1</span><span><b>Pick your cert</b> — Network+, Security+, A+ …</span></div>'+
        '<div class="step"><span class="num">2</span><span><b>"Locked until Pro"</b> confirm</span></div>'+
        '<div class="step"><span class="num">3</span><span>Optional <b>diagnostic</b> → your cert home (20 q/day)</span></div>'+
        '<button class="close" onclick="closeSheet()">Got it</button>';
    }
    var price = sel === 'annual' ? '$89/yr' : '$9.99/mo';
    return '<h3>Next: payment</h3>'+
      '<p>This is where checkout goes — <b>Apple In-App Purchase</b> in the iOS app, <b>Stripe</b> on the web. (Not wired in this concept.)</p>'+
      '<div class="step"><span class="num">$</span><span><b>Pro · '+(sel==='annual'?'Annual':'Monthly')+'</b> — '+price+'</span></div>'+
      '<div class="step"><span class="num">2</span><span>Pay with <b>Apple Pay</b> / card</span></div>'+
      '<div class="step"><span class="num">3</span><span>Straight into <b>all certs, unlimited</b> — pick where to start</span></div>'+
      '<button class="close" onclick="closeSheet()">Got it</button>';
  }
  function openSheet(){ document.getElementById('sheet').innerHTML = sheetHTML(); document.getElementById('sheetbg').classList.add('open'); }
  window.closeSheet = function(){ document.getElementById('sheetbg').classList.remove('open'); };
  cta.addEventListener('click', openSheet);
  document.getElementById('sheetbg').addEventListener('click', function(e){ if(e.target.id==='sheetbg') closeSheet(); });
  skip.addEventListener('click', function(){ alert('(Concept) Restore purchase — re-checks your Apple/Stripe entitlement and unlocks Pro if found.'); });

  paint();
</script>
</body>
</html>
