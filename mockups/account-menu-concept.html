<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CertAnvil · Account pill + menu concept (product register · dg-system)</title>
<!--
  CONCEPT MOCKUP · not production. Restyles the live auth-state.js account
  pill + dropdown into the evolved dg-system so the app chrome matches the
  redesigned landing + diagnostic.

  Register : PRODUCT (app chrome · design SERVES the task, not brand
             expression). impeccable product lane = restrained: tinted
             neutrals + one accent, hairlines, clarity, fast.
  Audit fix vs the live component (screenshot):
   · purple avatar + generic card  -> tinted monogram + hairline popover
   · emoji glyphs (gear/cap/chart/arrow)  -> crisp 1.5px line SVG icons
     (impeccable/cinematic-product ban decorative emoji)
   · flat red "Sign out"  -> editorial: grouped by a divider, neutral text,
     accent on hover. Sign-out is low-destructive (reversible), so a loud
     off-palette red is overkill and would fight the system; separation
     carries the "different group" signal. (Open to a restrained danger
     variant if the founder wants stronger affordance.)
   · motion: emil-design-eng · origin-aware popover (scales from the pill,
     top-right, NOT center), 180ms strong ease-out, CSS transition (not
     keyframes) so rapid open/close retargets smoothly, chevron 180deg,
     pill :active press, item hover 120ms. Reduced-motion = opacity only.
  Dual-theme : the exact 4-block dg-* cascade + flash-free bootstrap +
               toggle, so it is provably the same system as the homepage.
-->
<style>
  /* 4-block dual-theme cascade (identical to the homepage/diagnostic system).
     base = DARK -> @media light -> [data-theme=dark] -> [data-theme=light]
     LAST, equal specificity, source-order = the cascade-correctness fix. */
  html:root {
    --dg-bg: oklch(0.17 0.008 275); --dg-bg-2: oklch(0.205 0.009 275);
    --dg-rule: oklch(0.32 0.011 275); --dg-rule-soft: oklch(0.255 0.010 275);
    --dg-text: oklch(0.96 0.006 275); --dg-text-2: oklch(0.80 0.012 275);
    --dg-text-dim: oklch(0.725 0.013 275);
    --dg-accent: oklch(0.80 0.155 64); --dg-accent-ink: oklch(0.20 0.045 64);
    --dg-pass: oklch(0.74 0.150 152);
    --t-1: 12.5px; --t0: 15px; --t1: 19px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  @media (prefers-color-scheme: light) {
    html:root {
      --dg-bg: oklch(0.975 0.007 85); --dg-bg-2: oklch(0.945 0.008 85);
      --dg-rule: oklch(0.85 0.011 85); --dg-rule-soft: oklch(0.90 0.009 85);
      --dg-text: oklch(0.26 0.015 280); --dg-text-2: oklch(0.42 0.014 280);
      --dg-text-dim: oklch(0.50 0.013 280);
      --dg-accent: oklch(0.50 0.155 55); --dg-accent-ink: oklch(0.98 0.012 70);
      --dg-pass: oklch(0.50 0.15 150);
    }
  }
  html[data-theme="dark"] {
    --dg-bg: oklch(0.17 0.008 275); --dg-bg-2: oklch(0.205 0.009 275);
    --dg-rule: oklch(0.32 0.011 275); --dg-rule-soft: oklch(0.255 0.010 275);
    --dg-text: oklch(0.96 0.006 275); --dg-text-2: oklch(0.80 0.012 275);
    --dg-text-dim: oklch(0.725 0.013 275);
    --dg-accent: oklch(0.80 0.155 64); --dg-accent-ink: oklch(0.20 0.045 64);
    --dg-pass: oklch(0.74 0.150 152);
  }
  html[data-theme="light"] {
    --dg-bg: oklch(0.975 0.007 85); --dg-bg-2: oklch(0.945 0.008 85);
    --dg-rule: oklch(0.85 0.011 85); --dg-rule-soft: oklch(0.90 0.009 85);
    --dg-text: oklch(0.26 0.015 280); --dg-text-2: oklch(0.42 0.014 280);
    --dg-text-dim: oklch(0.50 0.013 280);
    --dg-accent: oklch(0.50 0.155 55); --dg-accent-ink: oklch(0.98 0.012 70);
    --dg-pass: oklch(0.50 0.15 150);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dg-bg); color: var(--dg-text);
    font-family: Inter, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif;
    font-size: var(--t0); line-height: 1.5; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* faux app top-bar so the pill reads in context */
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--dg-rule-soft);
  }
  .brand { font-size: var(--t-1); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dg-text-2); }
  .brand b { color: var(--dg-accent); }
  .bar-r { display: flex; align-items: center; gap: 16px; }
  .theme-toggle {
    background: none; border: 1px solid var(--dg-rule); border-radius: 8px;
    color: var(--dg-text-dim); font: 600 var(--t-1)/1 Inter, sans-serif;
    padding: 8px 12px; cursor: pointer; letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--dg-accent); color: var(--dg-accent); }
  .page-hint { padding: 80px 24px; color: var(--dg-text-dim); font-size: var(--t-1); letter-spacing: 0.04em; }

  /* ACCOUNT PILL */
  .acct { position: relative; }
  .pill {
    display: flex; align-items: center; gap: 10px;
    background: var(--dg-bg-2); border: 1px solid var(--dg-rule);
    border-radius: 999px; padding: 6px 12px 6px 6px; cursor: pointer;
    color: var(--dg-text-2); font: 600 var(--t-1)/1 Inter, sans-serif;
    max-width: 230px; transition: border-color 0.15s var(--ease), transform 0.12s var(--ease);
  }
  .pill:hover { border-color: var(--dg-text-dim); }
  .pill:active { transform: scale(0.98); }
  .pill:focus-visible { outline: 2px solid var(--dg-accent); outline-offset: 2px; }
  .avatar {
    width: 26px; height: 26px; flex: none; border-radius: 50%;
    display: grid; place-items: center; font-weight: 800; font-size: 12px;
    color: var(--dg-accent);
    background: color-mix(in oklab, var(--dg-accent) 18%, var(--dg-bg));
  }
  .pill-email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chev { width: 14px; height: 14px; flex: none; color: var(--dg-text-dim); transition: transform 0.18s var(--ease); }
  .acct.open .chev { transform: rotate(180deg); }

  /* DROPDOWN · hairline popover, origin-aware (scales from the pill) */
  .menu {
    position: absolute; top: calc(100% + 8px); right: 0; width: 264px;
    background: var(--dg-bg); border: 1px solid var(--dg-rule);
    border-radius: 14px; padding: 6px; transform-origin: top right;
    box-shadow: 0 18px 44px -16px color-mix(in oklab, var(--dg-text) 22%, transparent);
    opacity: 0; transform: scale(0.97) translateY(-4px); pointer-events: none;
    transition: opacity 0.18s var(--ease), transform 0.18s var(--ease);
    z-index: 50;
  }
  .acct.open .menu { opacity: 1; transform: none; pointer-events: auto; }
  .menu-id { padding: 12px 12px 11px; }
  .menu-email { font-size: var(--t-1); font-weight: 700; color: var(--dg-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .menu-status { margin-top: 6px; font-size: 11.5px; color: var(--dg-text-dim); display: flex; align-items: center; gap: 7px; letter-spacing: 0.02em; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dg-pass); flex: none; }
  .menu-sep { height: 1px; background: var(--dg-rule-soft); margin: 5px 6px; }
  .mi {
    display: flex; align-items: center; gap: 11px; width: 100%;
    background: none; border: 0; cursor: pointer; text-align: left;
    padding: 10px 12px; border-radius: 9px;
    font: 600 var(--t-1)/1.2 Inter, sans-serif; color: var(--dg-text-2);
    transition: background 0.12s ease, color 0.12s ease;
  }
  .mi svg { width: 16px; height: 16px; flex: none; color: var(--dg-text-dim); transition: color 0.12s ease; }
  .mi:hover, .mi:focus-visible { background: var(--dg-bg-2); color: var(--dg-text); outline: none; }
  .mi:hover svg, .mi:focus-visible svg { color: var(--dg-accent); }
  .mi-out { color: var(--dg-text-dim); }
  .mi-out:hover, .mi-out:focus-visible { color: var(--dg-accent); }

  @media (prefers-reduced-motion: reduce) {
    .menu { transition: opacity 0.12s linear; transform: none; }
    .acct.open .menu { transform: none; }
    .chev, .pill, .theme-toggle, .mi { transition: none; }
  }
</style>
<script>
  /* flash-free: persisted theme wins, else @media prefers-color-scheme */
  (function () {
    try {
      var t = localStorage.getItem('certanvilTheme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
</head>
<body>

<header class="bar">
  <span class="brand">Cert<b>Anvil</b></span>
  <span class="bar-r">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light/dark theme">Theme</button>
    <span class="acct open" id="acct">
      <button class="pill" id="pill" type="button" aria-haspopup="menu" aria-expanded="true" aria-controls="acctmenu">
        <span class="avatar" aria-hidden="true">S</span>
        <span class="pill-email">simi.oremosu@gmail.com</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="menu" id="acctmenu" role="menu" aria-label="Account">
        <div class="menu-id">
          <div class="menu-email">simi.oremosu@gmail.com</div>
          <div class="menu-status"><span class="dot" aria-hidden="true"></span> Free tier · Network+ unlocked</div>
        </div>
        <div class="menu-sep"></div>
        <button class="mi" role="menuitem" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Account settings
        </button>
        <button class="mi" role="menuitem" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22 10L12 5 2 10l10 5 10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          My certs
        </button>
        <button class="mi" role="menuitem" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 21V10M12 21V4M19 21v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Cross-cert analytics
        </button>
        <div class="menu-sep"></div>
        <button class="mi mi-out" role="menuitem" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 17l5-5-5-5M20 12H9M9 4H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Sign out
        </button>
      </div>
    </span>
  </span>
</header>

<p class="page-hint">Pill shown open for review. Click it to toggle, click outside or press Esc to close. Toggle the theme top-right.</p>

<script>
  (function () {
    var acct = document.getElementById('acct');
    var pill = document.getElementById('pill');
    function setOpen(open) {
      acct.classList.toggle('open', open);
      pill.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    pill.addEventListener('click', function (e) {
      e.stopPropagation();
      setOpen(!acct.classList.contains('open'));
    });
    document.addEventListener('click', function (e) {
      if (!acct.contains(e.target)) setOpen(false);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && acct.classList.contains('open')) { setOpen(false); pill.focus(); }
    });
  })();
  (function () {
    var btn = document.getElementById('themeToggle');
    var mq = window.matchMedia('(prefers-color-scheme: light)');
    function effective() {
      var a = document.documentElement.getAttribute('data-theme');
      if (a === 'light' || a === 'dark') return a;
      return mq.matches ? 'light' : 'dark';
    }
    function label() { btn.textContent = effective() === 'light' ? 'Dark' : 'Light'; }
    label();
    btn.addEventListener('click', function () {
      var next = effective() === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('certanvilTheme', next); } catch (e) {}
      label();
    });
    mq.addEventListener('change', function () {
      if (!document.documentElement.getAttribute('data-theme')) label();
    });
  })();
</script>

</body>
</html>
